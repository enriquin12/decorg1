<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Página 2 - Carteirinha</title>
<!-- PWA / iOS -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<style>
  :root { --vh: 100vh; }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  /* Wrapper que ocupa toda a tela e faz o scroll horizontal */
  .slider-wrapper {
    display: flex;
    width: 200vw; /* dois slides lado a lado */
    height: 100%;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  /* Cada slide ocupa exatamente a largura da tela */
  .slide {
    width: 100vw;
    height: 100%;
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }

  /* Fundo de cada slide */
  .bg {
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
    background-position: center top;
    background-size: cover;
    z-index: 0;
    pointer-events: none;
  }

  #bg-frente { background-image: url('pagina2.jpeg'); }
  #bg-verso  { background-image: url('pagina3.jpeg'); }

  /* Camada de UI de cada slide */
  .ui {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .hotspot {
    position: absolute;
    background: rgba(255,0,0,0);
    border: none;
    padding: 0;
    margin: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Botão voltar — igual ao original */
  .btn-back {
    top: 2.6%;
    left: 3.6%;
    width: 9.2%;
    height: 6.8%;
    min-width: 44px;
    min-height: 44px;
  }

  /* Botão "VERSO" na frente */
  #btn-verso {
    top: 5.2%;
    left: 50.5%;
    width: 14.5%;
    height: 6.2%;
    transform: translateX(-8%);
    min-width: 44px;
    min-height: 44px;
  }

  /* Botão "FRENTE" no verso */
  #btn-frente {
    top: 5.2%;
    left: 18.5%;
    width: 14.5%;
    height: 6.2%;
    transform: translateX(-8%);
    min-width: 44px;
    min-height: 44px;
  }

  /* Timestamp */
  .auth-container {
    position: absolute;
    left: 6%;
    right: 6%;
    bottom: calc(env(safe-area-inset-bottom) + 72px);
    z-index: 2;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 15px;
    color: #000;
    line-height: 1;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .auth-container .auth {
    font-weight: 400;
    font-size: 15px;
    pointer-events: none;
  }

  /* Indicadores de paginação (bolinhas) */
  .dots {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom) + 36px);
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 8px;
    z-index: 10;
    pointer-events: none;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(0,0,0,0.25);
    transition: background 0.3s;
  }

  .dot.active {
    background: rgba(0,0,0,0.65);
  }

  @media (max-width: 360px) {
    .btn-back    { top: 3.2%; left: 4.2%; width: 11%; height: 7.6%; }
    #btn-verso   { top: 6.2%; left: 51%;  width: 17%; height: 7.6%; transform: translateX(-9%); }
    #btn-frente  { top: 6.2%; left: 19%;  width: 17%; height: 7.6%; transform: translateX(-9%); }
    .auth-container { left: 5%; right: 5%; bottom: calc(env(safe-area-inset-bottom) + 56px); font-size: 12px; }
  }

  @media (min-width: 900px) {
    .btn-back, #btn-verso, #btn-frente { min-width: 56px; min-height: 56px; }
  }
</style>
</head>
<body>

<!-- Slider principal -->
<div class="slider-wrapper" id="slider">

  <!-- SLIDE 1: FRENTE -->
  <div class="slide" id="slide-frente">
    <div class="bg" id="bg-frente" aria-hidden="true"></div>
    <div class="ui" role="main" aria-label="Frente da carteirinha">
      <button class="hotspot btn-back" id="btn-back-frente" aria-label="Voltar"></button>
      <button class="hotspot" id="btn-verso" aria-label="Ver verso"></button>
      <div class="auth-container" role="status" aria-live="polite" aria-atomic="true">
        <span>Última atualização em:</span>
        <span id="auth-timestamp-frente" class="auth">carregando...</span>
      </div>
    </div>
  </div>

  <!-- SLIDE 2: VERSO -->
  <div class="slide" id="slide-verso">
    <div class="bg" id="bg-verso" aria-hidden="true"></div>
    <div class="ui" role="main" aria-label="Verso da carteirinha">
      <button class="hotspot btn-back" id="btn-back-verso" aria-label="Voltar"></button>
      <button class="hotspot" id="btn-frente" aria-label="Ver frente"></button>
      <div class="auth-container" role="status" aria-live="polite" aria-atomic="true">
        <span>Última atualização em:</span>
        <span id="auth-timestamp-verso" class="auth">carregando...</span>
      </div>
    </div>
  </div>

</div>

<!-- Bolinhas indicadoras -->
<div class="dots" aria-hidden="true">
  <div class="dot active" id="dot-0"></div>
  <div class="dot"        id="dot-1"></div>
</div>

<script>
  // ── Corrige 100vh no iOS ──────────────────────────────────────────────────
  function setVh() {
    document.documentElement.style.setProperty(
      '--vh', (window.innerHeight || document.documentElement.clientHeight) + 'px'
    );
  }
  setVh();
  window.addEventListener('resize', setVh);

  // ── Timestamp ─────────────────────────────────────────────────────────────
  function two(n) { return n < 10 ? '0' + n : String(n); }
  function buildTimestamp(date) {
    const d  = two(date.getDate());
    const m  = two(date.getMonth() + 1);
    const y  = String(date.getFullYear()).slice(-2);
    const hh = two(date.getHours());
    const mm = two(date.getMinutes());
    return `${d}/${m}/${y} - ${hh}:${mm}`;
  }
  function setAuthTimestamps() {
    const ts = buildTimestamp(new Date());
    ['auth-timestamp-frente', 'auth-timestamp-verso'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = ts;
    });
  }

  // ── Controle de slide ─────────────────────────────────────────────────────
  const slider  = document.getElementById('slider');
  const dots    = [document.getElementById('dot-0'), document.getElementById('dot-1')];
  let current   = 0; // 0 = frente, 1 = verso

  function goTo(index) {
    current = index;
    slider.style.transform = `translateX(-${index * 100}vw)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === index));
  }

  // ── Botões de navegação ───────────────────────────────────────────────────
  document.getElementById('btn-back-frente').addEventListener('click', function(e) {
    e.preventDefault();
    location.assign('index.html');
  }, { passive: false });

  document.getElementById('btn-back-verso').addEventListener('click', function(e) {
    e.preventDefault();
    location.assign('index.html');
  }, { passive: false });

  document.getElementById('btn-verso').addEventListener('click', function(e) {
    e.preventDefault();
    goTo(1);
  }, { passive: false });

  document.getElementById('btn-frente').addEventListener('click', function(e) {
    e.preventDefault();
    goTo(0);
  }, { passive: false });

  // ── Swipe por toque ───────────────────────────────────────────────────────
  let touchStartX = null;
  let touchStartY = null;
  let dragging    = false;

  slider.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    dragging    = false;
  }, { passive: true });

  slider.addEventListener('touchmove', function(e) {
    if (touchStartX === null) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    // só considera swipe horizontal se o movimento horizontal for maior
    if (!dragging && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
      dragging = true;
    }
  }, { passive: true });

  slider.addEventListener('touchend', function(e) {
    if (!dragging || touchStartX === null) { touchStartX = null; return; }
    const dx = e.changedTouches[0].clientX - touchStartX;
    const threshold = 50; // px mínimos para trocar o slide
    if (dx < -threshold && current === 0) goTo(1);
    else if (dx > threshold && current === 1) goTo(0);
    touchStartX = null;
    dragging    = false;
  }, { passive: true });

  // ── Init ──────────────────────────────────────────────────────────────────
  window.addEventListener('load', function() {
    setAuthTimestamps();
    goTo(0);
  });

  // Debug standalone
  (function() {
    const isStandalone = window.navigator.standalone ||
      window.matchMedia('(display-mode: standalone)').matches;
    console.info('Standalone?', isStandalone);
  })();

  // Service Worker opcional
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {/* não crítico */});
  }
</script>
</body>
</html>
