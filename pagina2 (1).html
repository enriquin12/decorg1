<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Carteirinha</title>
<!-- PWA / iOS -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<style>
  :root { --vh: 100vh; }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    -webkit-user-select: none;
    user-select: none;
    background: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
  }

  .btn-back {
    background: none;
    border: none;
    padding: 6px;
    margin: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    min-height: 44px;
    border-radius: 50%;
  }

  .btn-back:active { background: rgba(0,0,0,0.06); }

  .btn-back svg {
    width: 22px;
    height: 22px;
    stroke: #333;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .header-title {
    flex: 1;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    color: #111;
    margin-right: 44px; /* compensa o botão voltar para centralizar */
  }

  /* ── ÁREA CENTRAL (cresce para preencher) ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 0 16px;
    overflow: hidden;
  }

  /* ── CARROSSEL ── */
  .carousel-outer {
    width: 100%;
    overflow: hidden;
    position: relative;
  }

  .carousel-track {
    display: flex;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  .carousel-slide {
    flex-shrink: 0;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
  }

  .card-img {
    width: 100%;
    max-width: 380px;
    height: auto;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
    display: block;
    object-fit: cover;
    background: #d0d8e8;
    min-height: 200px;
  }

  /* ── LABEL FRENTE / VERSO ── */
  .slide-label {
    margin-top: 14px;
    font-size: 13px;
    font-weight: 500;
    color: #666;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    height: 18px;
    text-align: center;
  }

  /* ── BOLINHAS ── */
  .dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(0,0,0,0.2);
    transition: background 0.3s, transform 0.3s;
  }

  .dot.active {
    background: rgba(0,0,0,0.6);
    transform: scale(1.2);
  }

  /* ── RODAPÉ com timestamp ── */
  .footer {
    flex-shrink: 0;
    padding: 10px 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    text-align: center;
    font-size: 12px;
    color: #999;
  }
</style>
</head>
<body>

  <!-- HEADER fixo -->
  <header class="header">
    <button class="btn-back" id="btn-back" aria-label="Voltar">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="header-title">Carteirinha</div>
  </header>

  <!-- CONTEÚDO CENTRAL -->
  <main class="content">

    <!-- Carrossel apenas da imagem da carteirinha -->
    <div class="carousel-outer" id="carousel-outer">
      <div class="carousel-track" id="carousel-track">

        <!-- Slide: Frente -->
        <div class="carousel-slide">
          <img class="card-img" src="frente.jpeg" alt="Frente da carteirinha" draggable="false" />
        </div>

        <!-- Slide: Verso -->
        <div class="carousel-slide">
          <img class="card-img" src="verso.jpeg" alt="Verso da carteirinha" draggable="false" />
        </div>

      </div>
    </div>

    <!-- Label dinâmico -->
    <div class="slide-label" id="slide-label">Frente</div>

    <!-- Bolinhas indicadoras -->
    <div class="dots" aria-hidden="true">
      <div class="dot active" id="dot-0"></div>
      <div class="dot"        id="dot-1"></div>
    </div>

  </main>

  <!-- RODAPÉ fixo -->
  <footer class="footer" role="status" aria-live="polite" aria-atomic="true">
    Última atualização em: <span id="auth-timestamp">carregando...</span>
  </footer>

<script>
  // ── Corrige 100vh no iOS ──────────────────────────────────────────────────
  function setVh() {
    document.documentElement.style.setProperty(
      '--vh', (window.innerHeight || document.documentElement.clientHeight) + 'px'
    );
  }
  setVh();
  window.addEventListener('resize', setVh);

  // ── Timestamp ─────────────────────────────────────────────────────────────
  function two(n) { return n < 10 ? '0' + n : String(n); }
  function buildTimestamp(date) {
    return `${two(date.getDate())}/${two(date.getMonth()+1)}/${String(date.getFullYear()).slice(-2)} - ${two(date.getHours())}:${two(date.getMinutes())}`;
  }
  function setTimestamp() {
    const el = document.getElementById('auth-timestamp');
    if (el) el.textContent = buildTimestamp(new Date());
  }

  // ── Carrossel ─────────────────────────────────────────────────────────────
  const track  = document.getElementById('carousel-track');
  const dots   = [document.getElementById('dot-0'), document.getElementById('dot-1')];
  const label  = document.getElementById('slide-label');
  const labels = ['Frente', 'Verso'];
  let current  = 0;

  function goTo(index) {
    current = index;
    track.style.transform = `translateX(-${index * 100}vw)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === index));
    label.textContent = labels[index];
  }

  // ── Swipe por toque ───────────────────────────────────────────────────────
  let touchStartX = null;
  let touchStartY = null;
  let isSwiping   = false;

  const outer = document.getElementById('carousel-outer');

  outer.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isSwiping   = false;
  }, { passive: true });

  outer.addEventListener('touchmove', function(e) {
    if (touchStartX === null) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (!isSwiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
      isSwiping = true;
    }
  }, { passive: true });

  outer.addEventListener('touchend', function(e) {
    if (!isSwiping || touchStartX === null) { touchStartX = null; return; }
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (dx < -50 && current === 0) goTo(1);
    else if (dx > 50 && current === 1) goTo(0);
    touchStartX = null;
    isSwiping   = false;
  }, { passive: true });

  // ── Botão voltar ──────────────────────────────────────────────────────────
  document.getElementById('btn-back').addEventListener('click', function(e) {
    e.preventDefault();
    location.assign('index.html');
  }, { passive: false });

  // ── Init ──────────────────────────────────────────────────────────────────
  window.addEventListener('load', function() {
    setTimestamp();
    goTo(0);
  });

  // Debug standalone
  (function() {
    const isStandalone = window.navigator.standalone ||
      window.matchMedia('(display-mode: standalone)').matches;
    console.info('Standalone?', isStandalone);
  })();

  // Service Worker opcional
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
